<header class="bg-bravo-yellow border-b border-bravo-gold sticky top-0 z-50 shadow-sm">
  <div class="max-w-7xl mx-auto px-6">
    <div class="flex items-center justify-between h-18">
      <nav class="hidden md:block">
        <ul class="flex gap-8">
          <li><a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" (click)="closeMenu()" class="text-bravo-navy text-sm font-medium tracking-wide hover:text-bravo-navy/70 transition-colors duration-200 [&.active]:font-bold">Início</a></li>
          <li><a routerLink="/sobre-a-bravo" routerLinkActive="active" (click)="closeMenu()" class="text-bravo-navy text-sm font-medium tracking-wide hover:text-bravo-navy/70 transition-colors duration-200 [&.active]:font-bold">Sobre</a></li>
          <li><a routerLink="/containers" routerLinkActive="active" (click)="closeMenu()" class="text-bravo-navy text-sm font-medium tracking-wide hover:text-bravo-navy/70 transition-colors duration-200 [&.active]:font-bold">Containers</a></li>
          <li><a routerLink="/clientes" routerLinkActive="active" (click)="closeMenu()" class="text-bravo-navy text-sm font-medium tracking-wide hover:text-bravo-navy/70 transition-colors duration-200 [&.active]:font-bold">Clientes</a></li>
        </ul>
      </nav>

      <div class="hidden md:flex items-center gap-4">
        <a href="tel:+558100000000" class="text-bravo-navy text-sm font-medium hover:text-bravo-navy/70 transition-colors duration-200 flex items-center gap-1.5">
          <lucide-icon [img]="Phone" [size]="15" class="text-bravo-navy/60"></lucide-icon>(81) 9 9999-9999
        </a>
        <a routerLink="/fale-conosco" class="bg-bravo-navy text-white text-sm font-bold px-5 py-2.5 rounded-md hover:bg-bravo-navy-2 transition-all duration-200 hover:shadow-md hover:shadow-bravo-navy/30">
          Solicitar Orçamento
        </a>
      </div>

      <button class="md:hidden p-2 text-bravo-navy hover:text-bravo-navy/70 transition-colors duration-200" (click)="toggleMenu()" aria-label="Toggle menu">
        <lucide-icon [img]="menuOpen() ? X : Menu" [size]="24"></lucide-icon>
      </button>
    </div>

    <nav [class.max-h-screen]="menuOpen()" [class.max-h-0]="!menuOpen()" class="md:hidden overflow-hidden transition-all duration-300 ease-in-out">
      <ul class="flex flex-col py-4 border-t border-bravo-gold/50">
        <li><a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" (click)="closeMenu()" class="block text-bravo-navy text-sm font-medium py-3 hover:text-bravo-navy/70 transition-colors duration-200 [&.active]:font-bold">Início</a></li>
        <li><a routerLink="/sobre-a-bravo" routerLinkActive="active" (click)="closeMenu()" class="block text-bravo-navy text-sm font-medium py-3 hover:text-bravo-navy/70 transition-colors duration-200 [&.active]:font-bold">Sobre</a></li>
        <li><a routerLink="/containers" routerLinkActive="active" (click)="closeMenu()" class="block text-bravo-navy text-sm font-medium py-3 hover:text-bravo-navy/70 transition-colors duration-200 [&.active]:font-bold">Containers</a></li>
        <li><a routerLink="/clientes" routerLinkActive="active" (click)="closeMenu()" class="block text-bravo-navy text-sm font-medium py-3 hover:text-bravo-navy/70 transition-colors duration-200 [&.active]:font-bold">Clientes</a></li>
        <li class="pt-2">
          <a routerLink="/fale-conosco" (click)="closeMenu()" class="block w-full text-center bg-bravo-navy text-white text-sm font-bold px-5 py-3 rounded-md">Solicitar Orçamento</a>
        </li>
      </ul>
    </nav>
  </div>
</header>
